<div class="reading-progress-bar" id="reading-progress">
  <div class="reading-progress-fill" id="reading-progress-fill"></div>
</div>
<style>
.reading-progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: transparent;
  z-index: 9999;
}
.reading-progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #a50509, #ff4444);
  transition: width 0.1s ease-out;
}
.dark .reading-progress-fill {
  background: linear-gradient(90deg, #64b5f6, #90caf9);
}
</style>
<script>
(function() {
  var fill = document.getElementById('reading-progress-fill');
  if (!fill) return;
  window.addEventListener('scroll', function() {
    var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    var docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    fill.style.width = Math.min(progress, 100) + '%';
  });
})();
</script>
