<div class="reading-progress-bar" id="reading-progress">
  <div class="reading-progress-fill" id="reading-progress-fill"></div>
</div>
<style>
.reading-progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: transparent;
  z-index: 10001;
}
.reading-progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #a50509, #ff4444);
  transition: width 0.1s ease-out;
}
.dark .reading-progress-fill {
  background: linear-gradient(90deg, #64b5f6, #90caf9);
}
</style>
<script>
(function() {
  var progressBar = document.getElementById('reading-progress-fill');
  if (!progressBar) return;
  var ticking = false;
  window.addEventListener('scroll', function() {
    if (!ticking) {
      window.requestAnimationFrame(function() {
        var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        var progress = height > 0 ? (winScroll / height) * 100 : 0;
        progressBar.style.width = Math.min(progress, 100) + '%';
        ticking = false;
      });
      ticking = true;
    }
  });
})();
</script>
